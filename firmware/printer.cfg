[printer]
kinematics: corexy
max_velocity: 600                         # based on copper nozzle 0.4 max 50mm^3/s 434mm/s (at 80% 350mm/s) and high flow trianglelab nozzle 0.4 max 90mm^3/s 781mm/s (at 80% 630mm/s)
max_accel: 20000                          # safe values based on inputshaping
#max_accel_to_decel: 12000
max_z_velocity: 20
max_z_accel: 1500
square_corner_velocity: 10                # Cornering aggression – 10 high but not insane, 12 insane but works

