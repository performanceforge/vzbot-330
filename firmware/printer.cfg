[stepper_z]
## In M1 position
step_pin: PE2                         # Hardware mapping: the pin on the MCU that sends step pulses to the driver. Effect if changed: Wrong pin → motor won’t move. Relation to G-code: Every G1 Z… or G28 Z results in step pulses on this pin.
dir_pin: !PC5                         # Sets rotation direction. ! inverts. Effect: If wrong, G1 Z10 (move up) might go down. Relation to G-code: Direction changes whenever you command +Z vs −Z moves.
enable_pin: !PF11                     # Enables/disables the driver. ! = active-low. Effect: Wrong setting → motor never energizes or never releases.Relation to G-code: Activated when any Z move is commanded.
microsteps: 16                        # was 32 while std 16 no real benefit in Z says chatgpt Sets driver microstep interpolation (steps per full step).Effect: Higher = smoother motion, slightly better resolution, but more step pulses.Lower = less smooth, noisier, but lighter load on MCU.Relation to G-code: Your slicer still thinks in mm — Klipper translates to steps. No change in G-code needed.In practice: 16 is standard; 32 just makes coils whine more with no real Z-axis benefit.
rotation_distance: 4                  # mm per 1 full motor rotation. Effect: Sets scale of movement. Wrong value = printer thinks Z moved 1 mm when it really moved 0.8 or 1.2 mm. Relation to G-code: Critical — every G1 Z… depends on this. In practice: Determined by your leadscrew pitch × motor steps.
#endstop_pin: ^PG10                   # off for beacon #make sure to set the correct pin here.MCU pin for Z endstop. ^ means pull-up enabled. Effect: Wrong pin → Z won’t stop at the bed. Relation to G-code: Used during G28 Z.
endstop_pin: probe:z_virtual_endstop  # use beacon as virtual endstop
#position_endstop: 0.0                # The coordinate Klipper assigns when the endstop triggers. Effect: Sets the reference Z=0 (nozzle at bed). Relation to G-code: Defines where slicing coordinates start. Critical for first layer.
position_min: -0.2                    # -0.05 without beacon. new as of error # allow a small negative for first-layer squish / offsets but you can command it so the nozzle can crash be careful. -1.5 was given but high risk.
position_max: 400                     #### PLEASE CHECK CAREFULLY for me max 400 #### (also look for X and Y)
full_steps_per_rotation: 200          # Most steppers = 200 full steps per rev (1.8° per step). Effect: Needed for correct step/mm math. Wrong value → scaling errors.Relation to G-code: Along with rotation_distance defines how many steps per mm.
#homing_retract_dist: 5.0             # off if beacon probe #Distance to back off after endstop trigger, then re-home. Effect: Improves repeatability. Relation to G-code: Happens automatically during G28 Z.
homing_retract_dist: 0                # beacon needs this to be set to 0
homing_positive_dir: false            # Defines homing direction. false = negative direction (towards bed). Effect: Wrong setting → nozzle drives up instead of down during home. Relation to G-code: Only during G28 Z.
homing_speed: 5.0                     # Speed (mm/s) when homing. Effect: Slower = safer, more accurate. Faster = less accurate, risk overshoot. Relation to G-code: Used in G28 Z.
second_homing_speed: 2.5              # Speed for the second, fine homing pass. Effect: Improves precision at cost of time. Relation to G-code: Only during G28 Z.

[tmc2209 stepper_z]
interpolate: true                     # came false. If true, driver interpolates microsteps up to 256 internally. Effect: False = raw steps, slightly rougher. True = smoother, quieter.
uart_pin: PC4
run_current: 0.9                      # was 1.2 but loud and whining if too low z skips , 0.9 edit. Motor RMS current in amps. Effect: Too high → motor buzz/whine, gets hot, louder holding torque. Too low → motor weak, may skip steps. Relation to G-code: Doesn’t change speed or G-code itself. But if current is too low, high-speed Z moves (e.g. fast layer change in G-code) may stall. In practice: Z axis moves slowly; ~0.8–1.0A is usually plenty.
stealthchop_threshold: 0              # was 0. now 999999. Speed threshold for using stealthChop (quiet mode). 0 = always off → SpreadCycle (louder, stronger). 999999 = always on → stealthChop (quiet).Effect: SpreadCycle: loud hum, but robust at higher loads. StealthChop: nearly silent, but at very high speeds it can skip (not relevant for slow Z). Relation to G-code: Only affects how moves sound, not motion path.
hold_current: 0.5                     # suggested by chatgpt 
driver_PWM_AUTOGRAD: False
driver_PWM_AUTOSCALE: False

[extruder]
## In M0 position
### Vz-HextrudORT
step_pin: PE3
dir_pin: !PF13
enable_pin: !PF14
microsteps: 16                        # Driver subdivides each full step. Printing effect: 16 is the sweet spot (smooth, reliable, not CPU-heavy). 32 brings no real gain but can add coil “sing” if not interpolating.
#rotation_distance: 4.71              # OLD maybe?
#Alu VZhextrudort Moons 8T
#rotation_distance: 22.2
#Gear_ratio: 50:8
#Alu VZhextrudort Moons 10T
#rotation_distance: 22 
#gear_ratio: 50:10 
#VZHextrudort LDO 20mm
rotation_distance: 35.8               # 35.8 for hextrudort low plus, 22before These together tell Klipper “how many mm of filament per motor revolution”. Printing effect: This is the only parameter that changes extrusion amount (flow). If it’s off, you’ll over/under-extrude. We will calibrate this; don’t guess.
gear_ratio: 60:10                     # 60:10 for hextrudort low plus 10 teeth, Ratio between small and big gear 50:10beforeAs rotation distance both go together
nozzle_diameter: 0.4
filament_diameter: 1.750

heater_pin: PB0
sensor_type: PT1000
# smooth_time: 4.0 
sensor_pin: PF4

#control: pid
#pid_Kp=28.737 
#pid_Ki=1.935 
#pid_Kd=106.684
min_temp: 0
max_temp: 400
full_steps_per_rotation: 200
max_extrude_only_distance: 1000.0   
max_extrude_cross_section: 500
max_extrude_only_velocity: 200       # Limits “extrude only” moves (manual purges, etc.). Yours are generous; fine.
max_extrude_only_accel: 10000        # Limits “extrude only” moves (manual purges, etc.). Yours are generous; fine.
min_extrude_temp: 0                  # Allows cold extrusion; convenient for tests. For real printing, raise to ~170 °C.
pressure_advance: 0.02               # Compensates for filament elasticity. Tune after rotation_distance is correct.
pressure_advance_smooth_time: 0.03   # Compensates for filament elasticity. Tune after rotation_distance is correct.

[tmc2209 extruder]
uart_pin: PF12
interpolate: true                    # If true, the driver internally smooths to 256 microsteps → quieter. If false, it uses exactly your microsteps. Printing effect: Turning interpolate: true makes the stepper “feel” smoother without changing flow.
run_current: 0.9                     # was 0.7. RMS current (A). Printing effect: Too low → can skip on fast retracts; inconsistent extrusion. Too high → hot, noisy motor. For an LDO 36 mm pancake, 0.7–0.9 A is the usual window. Start 0.8 A if you push fast retractions.
sense_resistor: 0.110                # Board hardware value—leave as is. (Optional you may add) stealthchop_threshold
stealthchop_threshold: 0             # (Optional you may add) stealthchop_threshold For extruders, best practice is: leave stealthChop OFF (i.e., stealthchop_threshold: 0) so retractions at high accel don’t lose steps. If you want it quieter at idle, you can try a small threshold (or enable always), but watch for skipped retracts at speed.

