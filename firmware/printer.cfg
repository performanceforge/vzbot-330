# VZBot 330 reference configuration
# Shared as a working example from my machine
# Adapt serials, UUIDs, offsets, limits, currents, and hardware-specific values before use
# This config references additional include files used on my machine.
# Not all included files are published in this repository.
# Adapt or remove includes depending on your own setup.

### For Fly Super 8 V1.3 ####
### And Mellow Kit  ####
### For Fly Super pro 8, the SPI bus is spi1A
### For Fly Super 8 V1.3, the SPI bus is spi3

[include mainsail.cfg]                   # Available after Mainsail install
[include timelapse.cfg]                  # Remove if you are not going to use this function.
[include Exclude_Object.cfg]             # Available in https://docs.vzbot.org/vz235_printed/electronics/Printer_Config
[include start_stop.cfg]                 # Available in https://docs.vzbot.org/vz235_printed/electronics/Printer_Config or my version in github.com/performanceforge/vzbot-330
[include Macro.cfg]                      # Available in https://docs.vzbot.org/vz235_printed/electronics/Printer_Config
[include Speed.cfg]                      # Available in https://docs.vzbot.org/vz235_printed/electronics/Printer_Config
[display_status]                         # Available after Mainsail install
[exclude_object]                         # Available after Mainsail install
[virtual_sdcard]                         # Available after Mainsail install
