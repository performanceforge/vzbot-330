[fan]
##	Print Cooling Fan - PF8
pin: PF8                           # PF8 = off and !PF8 = on
max_power: 1
cycle_time: 0.0001                 # was 0.002 changed to cycle_time = 0.0001 → 10 kHz frequency (0.0001 s per cycle). For quiet fan/blower control, higher frequencies prevent audible whining or buzzing
hardware_pwm: false
shutdown_speed: 0
##	Print Cooling Fan - Startup OFF
#pwm: True                         # Enables PWM (pulse-width modulation), meaning you can set speeds from 0.0 to 1.0. If False, it acts like a binary ON/OFF switch only. Since you're controlling a variable-speed blower, use True
hardware_pwm: True                 # Uses dedicated hardware PWM timers on the MCU, no CPU overhead, and faster response. This is recommended if the pin supports it – and PF8 does support hardware PWM on the STM32H723. If you set hardware_pwm: false, Klipper emulates PWM in software — more CPU usage, less precise, may have startup glitches.
#shutdown_value: 0                 # When Klipper shuts down or restarts, this ensures the pin is LOW (or HIGH if inverted). Prevents the blower from continuing to run after emergency stop or restart. Use this always with fans or blowers.
#initial_value: 0                  # MOST IMPORTANT FOR YOU. Sets the pin state on MCU startup, before any gcode runs. Without this, the pin may default HIGH → blower spikes at startup.

[heater_fan hotend_fan]
##	Hotend Fan - FAN0 Connector
