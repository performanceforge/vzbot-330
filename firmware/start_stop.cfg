# VZBot 330 PRINT_START / PRINT_END reference
# Shared as a working example from my machine
# Adapt purge positions, bed area and probe behavior to your setup

#### 
#    To make your print_start macro work you need to put a bit of code in your slicer
#
#    In OrcaSlicer in the Start G-code section put:
# 
#    ;M104 S{first_layer_temperature[0]}       ; set nozzle temp uncomment to check preview
#    ;M140 S{first_layer_bed_temperature[0]}   ; set bed temp uncomment to check preview
#    PRINT_START BED_TEMP={first_layer_bed_temperature[0]} EXTRUDER_TEMP={first_layer_temperature[0]}
####
#    In OrcaSlicer in the End G-code you simply put:
#
#    PRINT_END    ;end script from macro
####

[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    
    # Start bed heating
    M117 Heating bed...
    # Start heating bed but don't wait yet
    M140 S{BED_TEMP}
    
    M117 Homing...                 ; display message
    # Home first
    G28

    # Move head to safe position
    G1 Z20 F600                   ;move the platform down 15mm
    G1 X0 Y0 F3000                ;move head to front to warm up and ooze outside of the printed area
    
    # Wait for bed to reach temperature
    M190 S{BED_TEMP}

    # Clear any old mesh and probe a new one with Beacon
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE
    
    # Set and wait for nozzle to reach temperature
    G1 X3 Y15 F3000               ; Base G1 X3 Y10, x outside the build plate, min X7 but 5mm recommendet X9
    M117 Heating Nozzle
    M109 S{EXTRUDER_TEMP}
    
    # Purge line sequence
    M117 Purging...
    G1 X9 Y10 F3000              ; Base G1 X3 Y10, x outside the build plate, min X7 but 5mm recommendet X9
    G1 Z0.3 F240                 ; go to purge height
    G92 E0                       ; zero the extruded length again
    G1 Y190 E15.0 F1500.0        ; intro line
    G1 X9.4 F5000                ; Base G1 X3.4 F5000, change X9.4
    G1 Y10 E30 F1200.0           ; intro line
    G92 E0.0                     ;zero the extruded length again
    G1 F9000
    
    M117 Printing...
    SKEW_PROFILE LOAD=Calilantern


[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script
gcode:
    #   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    
    #   Check end position to determine safe directions to move
    {% if printer.toolhead.position.x < (max_x - 15) %}
        {% set x_safe = 10.0 %}
    {% else %}
        {% set x_safe = -10.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 15) %}
        {% set y_safe = 10.0 %}
    {% else %}
        {% set y_safe = -10.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 50.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}
    
    #  Commence PRINT_END
    M400                             ; wait for buffer to clear
    G92 E0                           ; zero the extruder
    G1 E-4.0 F3600                   ; retract
    G91                              ; relative positioning
    G0 Z{z_safe + 10} F3600          ; move nozzle up
    G0 X{x_safe} Y{y_safe} F20000    ; move nozzle to remove stringing
    M104 S0                          ; turn off hotend
    M140 S0                          ; turn off bed
    M107                             ; turn off fan
    G90                              ; absolute positioning
    G0 X{max_x / 2} Y{max_y - 5} F3600   ; park nozzle at rear
    M84
    M117 Finished!
    SET_SKEW CLEAR=1

